<div class="register-container">
  <div class="register-box">
    <h1>Create Account</h1>
    
    <div *ngIf="error" class="error-message">
      {{ error }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input
          type="text"
          id="fullName"
          formControlName="fullName"
          placeholder="Enter your full name"
          class="form-control"
          [class.is-invalid]="submitted && f['fullName'].errors"
        />
        <div *ngIf="submitted && f['fullName'].errors" class="invalid-feedback">
          <div *ngIf="f['fullName'].errors['required']">Full name is required</div>
          <div *ngIf="f['fullName'].errors['minlength']">Full name must be at least 2 characters</div>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="Enter your email"
          class="form-control"
          [class.is-invalid]="submitted && f['email'].errors"
        />
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
          <div *ngIf="f['email'].errors['required']">Email is required</div>
          <div *ngIf="f['email'].errors['email']">Email is invalid</div>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Enter your password"
          class="form-control"
          [class.is-invalid]="submitted && f['password'].errors"
        />
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
          <div *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</div>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          formControlName="confirmPassword"
          placeholder="Confirm your password"
          class="form-control"
          [class.is-invalid]="submitted && (f['confirmPassword'].errors || registerForm.errors)"
        />
        <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
          <div *ngIf="f['confirmPassword'].errors['required']">Please confirm your password</div>
        </div>
        <div *ngIf="submitted && registerForm.errors?.['passwordMismatch']" class="invalid-feedback">
          Passwords do not match
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="isLoading"
      >
        {{ isLoading ? 'Creating Account...' : 'Register' }}
      </button>
    </form>

    <p class="login-link">
      Already have an account? <a routerLink="/login">Login here</a>
    </p>
  </div>
</div>
